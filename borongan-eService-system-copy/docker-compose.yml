version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: multysis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-multysis}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - multysis-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: multysis-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - multysis-network

  # Backend API
  backend:
    build:
      context: ./multysis-backend
      dockerfile: Dockerfile
    container_name: multysis-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-multysis}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "3000:3000"
    volumes:
      - ./multysis-backend:/app
      - /app/node_modules
    depends_on:
      - postgres
      - redis
    networks:
      - multysis-network

  # Frontend
  frontend:
    build:
      context: ./multysis-frontend
      dockerfile: Dockerfile
    container_name: multysis-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:3000/api
    ports:
      - "5173:5173"
    volumes:
      - ./multysis-frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - multysis-network

volumes:
  postgres_data:
  redis_data:

networks:
  multysis-network:
    driver: bridge

